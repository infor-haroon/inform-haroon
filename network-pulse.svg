<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="pulseGrad">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Pulse rings -->
  <circle cx="150" cy="150" r="20" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0">
    <animate attributeName="r" values="20;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="150" r="20" fill="none" stroke="#3fb950" stroke-width="1" opacity="0">
    <animate attributeName="r" values="20;80" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="150" r="20" fill="none" stroke="#f85149" stroke-width="1" opacity="0">
    <animate attributeName="r" values="20;80" dur="3s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Central node -->
  <circle cx="150" cy="150" r="18" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
  <circle cx="150" cy="150" r="6" fill="#58a6ff"/>
  <!-- Satellite nodes -->
  <circle cx="150" cy="50" r="8" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="150" cy="250" r="8" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="50" cy="150" r="8" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <circle cx="250" cy="150" r="8" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <circle cx="76" cy="76" r="6" fill="#0d1117" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="224" cy="76" r="6" fill="#0d1117" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="76" cy="224" r="6" fill="#0d1117" stroke="#d29922" stroke-width="1.5"/>
  <circle cx="224" cy="224" r="6" fill="#0d1117" stroke="#d29922" stroke-width="1.5"/>
  <!-- Connection lines -->
  <line x1="150" y1="150" x2="150" y2="50" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="150" x2="150" y2="250" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="150" x2="50" y2="150" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="150" x2="250" y2="150" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="150" x2="76" y2="76" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
  <line x1="150" y1="150" x2="224" y2="76" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
  <line x1="150" y1="150" x2="76" y2="224" stroke="#d29922" stroke-width="0.8" opacity="0.3"/>
  <line x1="150" y1="150" x2="224" y2="224" stroke="#d29922" stroke-width="0.8" opacity="0.3"/>
  <!-- Outer ring connections -->
  <line x1="150" y1="50" x2="76" y2="76" stroke="#3fb950" stroke-width="0.5" opacity="0.2"/>
  <line x1="150" y1="50" x2="224" y2="76" stroke="#3fb950" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="150" x2="76" y2="76" stroke="#f85149" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="150" x2="76" y2="224" stroke="#f85149" stroke-width="0.5" opacity="0.2"/>
  <line x1="250" y1="150" x2="224" y2="76" stroke="#f85149" stroke-width="0.5" opacity="0.2"/>
  <line x1="250" y1="150" x2="224" y2="224" stroke="#f85149" stroke-width="0.5" opacity="0.2"/>
  <line x1="150" y1="250" x2="76" y2="224" stroke="#3fb950" stroke-width="0.5" opacity="0.2"/>
  <line x1="150" y1="250" x2="224" y2="224" stroke="#3fb950" stroke-width="0.5" opacity="0.2"/>
</svg>
